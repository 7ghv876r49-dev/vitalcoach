async function seed() {
  const btn = document.querySelector('button');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Writing...';
  status.style.display = 'block';
  status.className = '';
  status.textContent = 'Writing to KV...';
  try {
    const res = await fetch('/storage?key=tracker&action=write', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key: 'tracker', value: DATA})
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'Write failed');
    status.className = 'ok';
    status.textContent = '✅ Done! ' + DATA.length + ' chars written. Delete seed.html from GitHub now.';
    btn.textContent = 'Done';
  } catch(e) {
    status.className = 'err';
    status.textContent = '❌ Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}
