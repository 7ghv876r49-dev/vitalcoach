function log(msg) { document.getElementById('log').textContent += msg + '\n'; }

async function runSeed() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true; btn.textContent = 'Seeding...';
  status.style.display = 'none';
  document.getElementById('log').textContent = '';
  try {
    log('Writing tracker (' + TRACKER.length + ' chars) to KV...');
    const res = await fetch('/storage?key=tracker&action=write', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key: 'tracker', value: TRACKER})
    });
    if (!res.ok) throw new Error('Storage returned ' + res.status + ': ' + await res.text());
    log('Write OK: ' + JSON.stringify(await res.json()));
    log('Verifying read-back...');
    const v = await fetch('/storage?key=tracker&action=read');
    const vd = await v.json();
    const len = vd.value ? vd.value.length : 0;
    log('Read-back: ' + len + ' chars');
    if (len > 1000) {
      status.textContent = '✓ Seeded — ' + len + ' chars. Submit button is live.';
      status.className = 'ok';
    } else {
      throw new Error('Read-back too short: ' + len);
    }
  } catch(e) {
    log('ERROR: ' + e.message);
    status.textContent = '✗ Failed: ' + e.message;
    status.className = 'err';
  }
  status.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Seed KV with tracker';
}
